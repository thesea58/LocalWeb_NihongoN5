<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Trang học 500 từ vựng TOEIC Nhật - Anh - Việt." />
  <title>TOEIC Vocabulary | 日本語 Study</title>
  <link href="./toeic-vocabulary.css" rel="stylesheet" />
  <link href="./dataset-selector.css" rel="stylesheet" />
  <link href="./toeic-examples.css" rel="stylesheet" />
  <link href="./tool-panel.css" rel="stylesheet" />
  <link href="./wake-lock.css" rel="stylesheet" />
  <link href="./meaning-reveal.css" rel="stylesheet" />
  <script defer src="../site-menu.js"></script>
</head>
<body>
  <main class="page-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">TOEIC Vocabulary Studio</p>
        <h1>Học từ vựng Nhật · Anh · Việt</h1>
        <p class="subtitle">Chọn bộ dữ liệu, nghe phát âm, xem câu ví dụ và chuyển từ ngẫu nhiên không lặp liên tục.</p>
      </div>
      <div class="stats-pill" aria-label="Thống kê danh sách">
        <strong id="totalWords">0</strong>
        <span>từ vựng trong bộ đang chọn</span>
      </div>
    </header>

    <section class="toolbar" aria-label="Chọn dữ liệu, tìm kiếm và chuyển nhanh">
      <label class="dataset-field" for="datasetSelect">
        <span class="dataset-label">Bộ dữ liệu</span>
        <select id="datasetSelect" class="dataset-select" aria-label="Chọn bộ dữ liệu" disabled>
          <option>Đang tải danh sách...</option>
        </select>
      </label>

      <div class="field-wrap">
        <span class="field-icon" aria-hidden="true">⌕</span>
        <input id="searchInput" class="search-input" type="search" autocomplete="off" placeholder="Tìm 日本語, English hoặc tiếng Việt..." aria-label="Tìm từ vựng" aria-controls="searchResults" />
        <div id="searchResults" class="search-results" role="listbox"></div>
      </div>
      <input id="idInput" class="id-input" type="number" min="1" inputmode="numeric" placeholder="Đi tới ID" aria-label="Chuyển tới ID" />
    </section>

    <section id="cardHost" class="study-card" aria-live="polite">
      <div class="loading-state">
        <div>
          <div class="loader" aria-hidden="true"></div>
          <strong>Đang tải danh sách bộ dữ liệu...</strong>
        </div>
      </div>
    </section>

    <div class="progress-shell" aria-label="Tiến độ vị trí hiện tại">
      <div class="progress-meta">
        <span id="positionText">Từ 0 / 0</span>
        <span id="randomRemaining">Ngẫu nhiên: đang chuẩn bị</span>
      </div>
      <div class="progress-track">
        <div id="progressFill" class="progress-fill"></div>
      </div>
    </div>

    <nav class="controls" aria-label="Điều hướng từ vựng">
      <button id="previousButton" class="control-button" type="button" disabled>← Từ trước</button>
      <button id="randomButton" class="control-button random" type="button" disabled>✦ Từ ngẫu nhiên</button>
      <button id="nextButton" class="control-button" type="button" disabled>Từ sau →</button>
    </nav>
  </main>

  <input id="jsonFileInput" type="file" accept="application/json,.json" hidden />
  <div id="toast" class="toast" role="status"></div>
  <script defer src="./vietnamese-glossary-loader.js"></script>
  <script defer src="./dataset-selector.js"></script>
  <script defer src="./toeic-vocabulary.js"></script>
  <script defer src="./speech-voices.js"></script>
  <script defer src="./mobile-swipe.js"></script>
  <script defer src="./tool-panel.js"></script>
  <script defer src="./wake-lock.js"></script>
  <script defer src="./meaning-reveal.js"></script>
</body>
</html>
