name: Materialize TOEIC 600 dataset

on:
  push:
    branches:
      - main
    paths:
      - ".github/toeic_source/**"
      - ".github/workflows/materialize-toeic-600.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build JSON and update dataset manifest
        shell: bash
        run: |
          python - <<'PY'
          import json
          import shutil
          from collections import Counter
          from pathlib import Path

          root = Path(".")
          source_dir = root / ".github" / "toeic_source"
          rows = []

          for path in sorted(source_dir.glob("part*.jsonl")):
              for line in path.read_text(encoding="utf-8").splitlines():
                  if line.strip():
                      rows.append(json.loads(line))

          assert len(rows) == 598, f"Expected 598 rows, got {len(rows)}"
          assert [row["r"] for row in rows] == list(range(1, 599)), "Ranks must be sequential from 1 to 598"
          assert all(row["e"].strip() and row["v"].strip() for row in rows), "English and Vietnamese are required"

          categories = Counter(row["c"] for row in rows)
          vocabularies = []

          for row in rows:
              vocabularies.append({
                  "rank": row["r"],
                  "english": row["e"],
                  "japanese": "",
                  "vietnamese": row["v"],
                  "part_of_speech": row["p"],
                  "category": row["c"],
                  "english_pronunciation_ipa": row["i"],
                  "japanese_hiragana": "",
                  "translation_review": "source-excel",
                  "verified_collocation_count": 0,
                  "has_collocation": False,
                  "collocations": [],
                  "example_sentences": {
                      "english": row["ee"],
                      "japanese": "",
                      "vietnamese": row["ev"],
                  },
              })

          payload = {
              "metadata": {
                  "title": "600 Essential Words for the TOEIC — English–Vietnamese",
                  "version": "2026-07-10",
                  "source_file": "600Essential Words_with_Category.xlsx",
                  "total_vocabulary": len(vocabularies),
                  "expected_vocabulary": 600,
                  "actual_source_rows": 598,
                  "category_count": len(categories),
                  "category_counts": dict(categories),
                  "languages": ["English", "Japanese", "Vietnamese"],
                  "japanese_fields": "Intentionally left empty as requested.",
                  "notes": [
                      "The source workbook contains 598 vocabulary rows, not 600.",
                      "Property and Department contains 10 rows; the other 49 categories contain 12 rows each.",
                      "Duplicate English headwords are preserved because they appear in different source categories."
                  ],
                  "duplicate_english_headwords": {
                      "constantly": [161, 368],
                      "express": [186, 378]
                  }
              },
              "vocabularies": vocabularies
          }

          assert all(word["japanese"] == "" for word in vocabularies)
          assert all(word["japanese_hiragana"] == "" for word in vocabularies)
          assert all(word["example_sentences"]["japanese"] == "" for word in vocabularies)

          output = root / "FlashCard" / "data" / "Eng-Ja-Vi" / "toeic_600_essential_words_en_vi.json"
          output.write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          manifest_path = root / "FlashCard" / "data" / "Eng-Ja-Vi" / "toeic_datasets.json"
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          manifest["metadata"]["version"] = "2026-07-10"

          new_dataset = {
              "id": "toeic-600-essential-en-vi",
              "label": "600 Essential Words · Anh–Việt",
              "short_label": "600 Essential · EN–VI",
              "description": "Dữ liệu Anh–Việt từ Excel; trường tiếng Nhật để trống. File nguồn hiện có 598 từ.",
              "url": "../data/Eng-Ja-Vi/toeic_600_essential_words_en_vi.json?vietnamese=original"
          }

          manifest["datasets"] = [
              dataset for dataset in manifest["datasets"]
              if dataset.get("id") != new_dataset["id"]
          ]
          manifest["datasets"].append(new_dataset)
          manifest_path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          shutil.rmtree(source_dir)
          (root / ".github" / "workflows" / "materialize-toeic-600.yml").unlink()
          PY

      - name: Commit generated dataset
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add TOEIC 600 English-Vietnamese dataset [skip ci]"
          git push
